---
# Variables con precedencia baja (defaults). Pueden sobreescribirse desde el playbook,
# desde group_vars/host_vars, o con --extra-vars, sin necesidad de modificar el rol.
# La prioridad de variables en Ansible va de menor a mayor:
#   defaults → vars del rol → group_vars → host_vars → --extra-vars

directorio_web: /var/www/bootcamperu  # directorio donde nginx sirve los archivos estáticos del sitio
nombre_sitio:   bootcamperu           # nombre del sitio en sites-available y sites-enabled de nginx

# NOTA: la variable 'app_private_ip' (IP privada del backend) NO se define en este archivo.
# Se inyecta en tiempo de ejecución por Terraform mediante --extra-vars cuando llama a
# ansible-playbook desde aprovisionamiento.tf. Es el mecanismo que conecta la capa de
# infraestructura (Terraform) con la capa de configuración (Ansible): Terraform conoce
# la IP privada del backend porque la creó, y Ansible la necesita para configurar nginx
# como reverse proxy apuntando al destino correcto.
# Ver: terraform/aprovisionamiento.tf → provisioner "local-exec" → --extra-vars
