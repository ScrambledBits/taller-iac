name: Pipeline IaC BootcampPeru

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno de destino'
        type: environment
        required: true

# Cancela ejecuciones anteriores en la misma rama para evitar applies simultáneos.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint de Terraform ─────────────────────────────────────────────
  # Ejecuta en: todo push/PR. NO necesita credenciales AWS (-backend=false).
  validar-terraform:
    name: Revisar el código Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init (sin backend)
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Instalar TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.61.0

      - name: TFLint Init
        run: tflint --config=.tflint.hcl --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: TFLint Run
        run: tflint --config=.tflint.hcl -f compact

  # ── Job 2: Escaneo de seguridad de Terraform ─────────────────────────────
  # Ejecuta en: todo push/PR. Lee .checkov.yaml para exclusiones del workshop.
  escanear-terraform:
    name: Escanear seguridad de Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml

  # ── Job 3: Lint de Ansible ────────────────────────────────────────────────
  # Ejecuta en: todo push/PR. Instala ansible-lint via pip para control exacto.
  validar-ansible:
    name: Revisar el código Ansible
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar ansible-lint
        run: pip install "ansible-lint[community,yamllint]" "ansible-core>=2.20"

      - name: Ejecutar ansible-lint
        run: ansible-lint ansible/playbook.yaml

  # ── Job 4: Terraform Plan (solo en PR) ───────────────────────────────────
  # Necesita credenciales AWS para acceder al backend S3.
  planificar-terraform:
    name: Planificar cambios de Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [validar-terraform, escanear-terraform, validar-ansible]
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -no-color -input=false

  # ── Job 5: Deploy (solo en push a main o workflow_dispatch) ──────────────
  # NO ejecuta en pull_request.
  # Instala Ansible porque aprovisionamiento.tf usa local-exec para ansible-playbook.
  desplegar:
    name: Desplegar infraestructura y apps
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [validar-terraform, escanear-terraform, validar-ansible]
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Ansible
        run: pip install "ansible-core>=2.20"

      - name: Verificar ansible-playbook
        run: ansible-playbook --version

      - name: Terraform Init
        run: terraform init -input=false

      - name: Crear plan
        run: terraform plan -no-color -input=false -out=pipeline.tfplan

      - name: Aplicar el plan de Terraform
        run: terraform apply -auto-approve pipeline.tfplan
