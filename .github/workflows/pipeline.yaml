on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  validar-terraform:
    name: Revisar el código Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: "Configurar credenciales AWS"
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with: 
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: "Instalar Terraform"
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check
        continue-on-error: true
        working-directory: ./terraform

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        working-directory: ./terraform

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ./terraform

      - uses: terraform-linters/setup-tflint@v6
        name: Setup TFLint
        with:
          tflint_version: v0.52.0
          cache: true

      - name: Show version
        run: tflint --version

      - name: Init TFLint
        run: tflint --init
        working-directory: ./terraform
        env:
          # https://github.com/terraform-linters/tflint/blob/master/docs/user-guide/plugins.md#avoiding-rate-limiting
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint -f compact
        working-directory: ./terraform

      # - name: Terraform security scan
      #   uses: triat/terraform-security-scan@v3.2.0

      # - name: Terrascan IaC scanner
      #   uses: tenable/terrascan-action@v1.4.1
      #   with:
      #     iac_type: 'terraform'
      #     iac_version: 'v14'
      #     policy_type: 'aws'
      #     only_warn: true
      #     verbose: true
      #     sarif_upload: true
      #     iac_dir: ./terraform

  validar-ansible:
    name: Revisar el código Ansible
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ansible
        uses: alex-oleshkevich/setup-ansible@v1.0.1
        with:
          version: "2.20.4"

      - name: run-ansible-lint
        uses: ansible/ansible-lint@v26.4.0
        with:
          setup_python: "true"
          python_version: "3.14"
          working_directory: "./ansible"

  desplegar:
    name: Desplegar infraestructura y apps
    runs-on: ubuntu-latest
    needs: ['validar-terraform', 'validar-ansible']
    steps:
      - name: "Configurar credenciales AWS"
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with: 
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: "Instalar Terraform"
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"

      - uses: actions/checkout@v4

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        working-directory: ./terraform

      - name: Crear plan
        id: plan
        run: terraform plan -no-color -out=pipeline.tfplan
        working-directory: ./terraform

      - name: Verificar archivos
        run: pwd && ls -lah
        working-directory: ./terraform
